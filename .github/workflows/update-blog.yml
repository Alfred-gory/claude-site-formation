name: Mise à jour blog quotidien

on:
  schedule:
    - cron: '0 6 * * *'   # Chaque matin à 6h UTC (8h heure de Paris)
  workflow_dispatch:        # Déclenchement manuel possible

permissions:
  contents: write

jobs:
  update-blog:
    runs-on: ubuntu-latest

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Installation Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installation des dépendances
        run: pip install feedparser requests

      - name: Récupération des actualités
        run: python update_blog.py

      - name: Publication sur le site
        run: |
          git config user.name "Alfred Gory Bot"
          git config user.email "formation@alfred-gory.fr"
          git add articles.json
          git diff --staged --quiet || git commit -m "Actualités du $(date +'%d/%m/%Y')"
          git push
