<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Merci — Cabinet Alfred Gory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem;background:var(--cream)}
    .merci-card{background:#fff;border:1px solid var(--border);border-radius:20px;padding:3rem 2.5rem;max-width:520px;width:100%;text-align:center;box-shadow:0 12px 40px rgba(11,24,41,.1)}
    .merci-icon{font-size:3rem;margin-bottom:1.4rem}
    .merci-title{font-size:1.8rem;font-weight:900;letter-spacing:-.04em;color:var(--navy);margin-bottom:.8rem}
    .merci-sub{color:var(--slate);line-height:1.8;margin-bottom:.4rem}
    .merci-accent{color:var(--gold);font-weight:700}
  </style>
</head>
<body>
  <div class="merci-card">
    <div class="merci-icon">✅</div>
    <h1 class="merci-title">Message envoyé !</h1>
    <p class="merci-sub">Merci pour votre demande.</p>
    <p class="merci-sub">Nous vous recontactons sous <span class="merci-accent">48h ouvrées</span>.</p>
    <p style="font-size:.78rem;color:var(--slate);margin-top:.6rem">Cabinet Alfred Gory · formation@alfred-gory.fr</p>
    <a href="index.html" class="btn btn-primary" style="margin-top:2rem;display:inline-flex">← Retour à l'accueil</a>
  </div>
</body>
</html>
