<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Merci — Cabinet Alfred Gory</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root{--primary:#1e3a5f;--accent-dark:#c9a84c}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',sans-serif;background:#f7f5f1;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem}
    .card{background:#fff;border-radius:20px;padding:3rem 2.5rem;max-width:500px;width:100%;text-align:center;box-shadow:0 8px 40px rgba(30,58,95,0.12)}
    .icon{font-size:3rem;margin-bottom:1.5rem}
    h1{font-family:'Playfair Display',serif;color:var(--primary);font-size:1.8rem;margin-bottom:1rem}
    p{color:#64748b;line-height:1.8;margin-bottom:0.5rem}
    .btn{display:inline-block;margin-top:2rem;background:var(--primary);color:#fff;padding:0.8rem 2rem;border-radius:8px;text-decoration:none;font-weight:600;font-size:0.9rem}
    .btn:hover{background:var(--accent-dark)}
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✅</div>
    <h1>Message envoyé !</h1>
    <p>Merci pour votre demande.</p>
    <p>Nous vous recontactons sous <strong>48h ouvrées</strong>.</p>
    <p style="font-size:0.82rem;margin-top:0.5rem;">Cabinet Alfred Gory — formation@alfred-gory.fr</p>
    <a href="index.html" class="btn">Retour à l'accueil</a>
  </div>
</body>
</html>
